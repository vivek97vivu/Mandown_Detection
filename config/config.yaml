models:
  yolo:
    path: "models/yolo/yolo26s.engine"
    input_size: 640
    conf_threshold: 0.45
    iou_threshold: 0.45
    use_tracking: true
    crop_padding: 0.15

  pose:
    path: "models/pose/rtmpose-m.onnx"
    backend: "rtmlib"
    input_size: [192, 256]
    min_kp_score: 0.30

device:
  inference: "cuda"
  fp16: true

# ── Decision ─────────────────────────────────────────────────
decision:
  # Body angle from vertical
  # Leaning at desk = ~50-60°. Truly fallen = 80-90°.
  angle_upright_max: 40.0
  angle_fallen_min: 78.0           # near-horizontal only

  # Bbox aspect ratio (width/height)
  # Standing person: ~0.4-0.6. Fallen person: >1.2 (wider than tall)
  aspect_upright_max: 0.85
  aspect_fallen_min: 1.30          # must be clearly wider than tall

  # Head must be very low in bbox to confirm fallen
  head_height_fallen_min: 0.65

  # Require hips + legs visible (enforced in code — partial bodies rejected)
  min_keypoints: 9                 # need torso AND lower body joints
  min_detection_conf: 0.45
  min_bbox_height_ratio: 0.15
  min_kp_visible_score: 0.25       # threshold for body-part visibility guards

  # Weight lower body heavily — it's the definitive fallen signal
  weight_angle:      0.35
  weight_aspect:     0.10
  weight_head:       0.15
  weight_lower_body: 0.30          # hips at ankle level = strong fallen signal
  weight_symmetry:   0.10

  fallen_score_threshold:    0.72  # strict
  crouching_score_threshold: 0.50

# ── Temporal ─────────────────────────────────────────────────
temporal:
  dwell_frames: 150                # 6s @25fps — must stay flat for 6 full seconds
  recovery_frames: 75
  score_ema_alpha: 0.20            # very smooth — ignore brief spikes
  max_unseen_frames: 60
  crouching_as_fallen: false

# ── Alerts ───────────────────────────────────────────────────
alert:
  snapshot_dir: "alerts/snapshots"
  pose_confirm_dir: "alerts/pose_confirm"
  video_clip_dir: "alerts/video_clips"
  save_snapshot: true
  save_video_clip: true
  clip_pre_frames: 50
  clip_post_frames: 75
  jpeg_quality: 85
  video_fps: 25.0
  video_codec: "MJPG"
  snapshot_cooldown_s: 30.0        # 30s between repeat alerts per track

# ── Drawing ──────────────────────────────────────────────────
drawing:
  kp_radius: 5
  kp_min_score: 0.30
  limb_thickness: 3
  bbox_thickness: 2
  show_track_id: true
  show_score: true
  show_state: true
  font_scale: 0.65
  font_thickness: 2
  small_font_scale: 0.50
  banner_height: 56
  banner_alpha: 0.80
  flash_hz: 2.0
  show_fps: true
  show_frame_idx: true
  hud_margin: 10

# ── Stream ────────────────────────────────────────────────────
stream:
  reconnect_delay_s: 3.0
  max_reconnect_attempts: 0
  frame_timeout_s: 5.0
  display: true
  display_scale: 1.0

zones: []

logging:
  log_dir: "logs"
  level: "INFO"
  enable_json: false
  max_bytes: 10485760
  backup_count: 5

worker:
  log_interval_frames: 100