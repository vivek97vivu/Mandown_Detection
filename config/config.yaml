# ============================================================
#  Man-Down Detection — Master Configuration
# ============================================================

cameras:
  - id: cam_1
    source: 0
    name: "Site Entry Camera"
    enabled: true
    use_gstreamer: false

  - id: cam_2
    source: "rtsp://admin:diffuse123@192.168.0.183:554/cam/realmonitor?channel=1&subtype=0"
    name: "Construction Zone Camera"
    enabled: true
    use_gstreamer: true
    codec: "h265"
    protocols: "tcp"
    latency: 0
    drop_on_latency: true

models:
  yolo:
    path: "models/yolo/yolo26s.engine"
    input_size: 640
    conf_threshold: 0.45
    iou_threshold: 0.45
    use_tracking: true
    crop_padding: 0.15

  pose:
    path: "models/pose/rtmpose-m.onnx"
    backend: "rtmlib"
    input_size: [192, 256]
    min_kp_score: 0.30

device:
  inference: "cuda"
  fp16: true

# ── Decision ─────────────────────────────────────────────────
decision:
  # Body angle
  angle_upright_max: 35.0
  angle_fallen_min: 75.0           # very horizontal only

  # Aspect ratio — seated person behind desk has wide bbox
  # Only fire when bbox is wider than tall (truly lying flat)
  aspect_upright_max: 0.80         # generous — seated is ~0.5-0.7
  aspect_fallen_min: 1.20          # only fire when wider than tall

  head_height_fallen_min: 0.60

  min_keypoints: 8                 # require 8+ joints — partial bodies skip
  min_detection_conf: 0.45

  # Min person size — ignore tiny detections (heads peeking over partition)
  # As fraction of frame height. 0.15 = person must be >15% of frame height
  min_bbox_height_ratio: 0.15      # NEW — skip detections smaller than this

  weight_angle:      0.50          # angle is most reliable
  weight_aspect:     0.10          # aspect very unreliable for partial bodies
  weight_head:       0.20
  weight_lower_body: 0.12
  weight_symmetry:   0.08

  fallen_score_threshold:    0.70  # very strict
  crouching_score_threshold: 0.45

# ── Temporal ─────────────────────────────────────────────────
temporal:
  dwell_frames: 150                # 6s @25fps — must stay flat for 6 full seconds
  recovery_frames: 75
  score_ema_alpha: 0.20            # very smooth — ignore brief spikes
  max_unseen_frames: 60
  crouching_as_fallen: false

# ── Alerts ───────────────────────────────────────────────────
alert:
  snapshot_dir: "alerts/snapshots"
  pose_confirm_dir: "alerts/pose_confirm"
  video_clip_dir: "alerts/video_clips"
  save_snapshot: true
  save_video_clip: true
  clip_pre_frames: 50
  clip_post_frames: 75
  jpeg_quality: 85
  video_fps: 25.0
  video_codec: "MJPG"
  snapshot_cooldown_s: 30.0        # 30s between repeat alerts per track

# ── Drawing ──────────────────────────────────────────────────
drawing:
  kp_radius: 5
  kp_min_score: 0.30
  limb_thickness: 3
  bbox_thickness: 2
  show_track_id: true
  show_score: true
  show_state: true
  font_scale: 0.65
  font_thickness: 2
  small_font_scale: 0.50
  banner_height: 56
  banner_alpha: 0.80
  flash_hz: 2.0
  show_fps: true
  show_frame_idx: true
  hud_margin: 10

# ── Stream ────────────────────────────────────────────────────
stream:
  reconnect_delay_s: 3.0
  max_reconnect_attempts: 0
  frame_timeout_s: 5.0
  display: true
  display_scale: 1.0

zones: []

logging:
  log_dir: "logs"
  level: "INFO"
  enable_json: false
  max_bytes: 10485760
  backup_count: 5

worker:
  log_interval_frames: 100